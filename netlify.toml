[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  publish = "dist"

[[redirects]]
  from = "/api/nhl/*"
  to = "/.netlify/functions/nhl-proxy?path=/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/statsapi/*"
  to = "/.netlify/functions/nhl-proxy?path=/:splat&host=statsapi"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
