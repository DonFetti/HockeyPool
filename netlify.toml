[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 5173
  publish = "dist"

# Proxy NHL via a Function so redirects (e.g. /v1/schedule/now → dated URL) are
# followed server-side. Netlify's URL proxy forwards 307 Location to the browser,
# which then hits api-web.nhle.com directly and fails CORS.
[[redirects]]
  from = "/api/nhl/*"
  to = "/.netlify/functions/nhl-proxy"
  status = 200
  force = true

[[redirects]]
  from = "/api/statsapi/*"
  to = "https://statsapi.web.nhl.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
